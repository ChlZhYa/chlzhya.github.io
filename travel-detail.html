<!DOCTYPE html>
<html class="light" lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>旅行详情 — Journey Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link crossorigin rel="preconnect" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="js/data.js"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {"on-background":"#111c2d","outline":"#757684","on-primary":"#ffffff","tertiary-fixed":"#dde3eb","tertiary-container":"#555b62","surface-container-low":"#f0f3ff","on-secondary":"#ffffff","primary-container":"#3f51b5","surface-variant":"#d8e3fb","surface-container-lowest":"#ffffff","on-tertiary-fixed-variant":"#41474e","tertiary":"#3d444a","primary-fixed-dim":"#bac3ff","on-surface":"#111c2d","on-secondary-fixed":"#0b1c30","secondary-container":"#d0e1fb","secondary":"#505f76","inverse-on-surface":"#ecf1ff","on-surface-variant":"#454652","background":"#f9f9ff","primary-fixed":"#dee0ff","outline-variant":"#c5c5d4","on-tertiary":"#ffffff","surface":"#f9f9ff","surface-container-highest":"#d8e3fb","surface-bright":"#f9f9ff","on-primary-fixed-variant":"#293ca0","surface-container-high":"#dee8ff","surface-container":"#e7eeff","primary":"#24389c","tertiary-fixed-dim":"#c1c7cf","on-error":"#ffffff","surface-tint":"#4355b9","on-tertiary-fixed":"#161c22","on-secondary-container":"#54647a","inverse-surface":"#263143","on-secondary-fixed-variant":"#38485d","error":"#ba1a1a","secondary-fixed-dim":"#b7c8e1","inverse-primary":"#bac3ff","on-primary-container":"#cacfff","on-primary-fixed":"#00105c","on-tertiary-container":"#cdd3db","surface-dim":"#cfdaf2","secondary-fixed":"#d3e4fe","on-error-container":"#93000a","error-container":"#ffdad6"},
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { "margin-desktop": "64px", "container-max": "1280px", base: "8px", "section-gap": "80px", "margin-mobile": "20px", gutter: "24px" },
        fontFamily: {"display-lg":["Hanken Grotesk"],"headline-lg":["Hanken Grotesk"],"headline-md":["Hanken Grotesk"],"display-lg-mobile":["Hanken Grotesk"],"body-lg":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"label-sm":["Inter"]},
        fontSize: {"display-lg":["48px",{lineHeight:"56px",letterSpacing:"-0.02em",fontWeight:"700"}],"display-lg-mobile":["36px",{lineHeight:"44px",letterSpacing:"-0.02em",fontWeight:"700"}],"headline-lg":["32px",{lineHeight:"40px",fontWeight:"600"}],"headline-md":["24px",{lineHeight:"32px",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"28px",fontWeight:"400"}],"body-md":["16px",{lineHeight:"24px",fontWeight:"400"}],"label-md":["14px",{lineHeight:"20px",letterSpacing:"0.01em",fontWeight:"500"}],"label-sm":["12px",{lineHeight:"16px",fontWeight:"600"}]}
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-display, .font-headline { font-family: 'Hanken Grotesk', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background antialiased">

<!-- Navigation -->
<nav id="navbar" class="bg-surface shadow-sm border-b border-outline-variant sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
    <a href="index.html" class="text-headline-md font-display font-black text-primary tracking-tight">Journey Scholar</a>
    <div class="hidden md:flex space-x-6" id="nav-links"></div>
    <div class="flex items-center space-x-4 text-primary">
      <button class="hover:bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">account_circle</span></button>
      <a href="admin.html" class="hover:bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">settings</span></a>
    </div>
  </div>
</nav>

<!-- Main Content Container -->
<div id="app"><div class="py-20 text-center text-on-surface-variant">加载中...</div></div>

<script>
  // Navigation
  (function() {
    const nav = document.getElementById('nav-links');
    const current = location.pathname.split('/').pop();
    NAV_LINKS.forEach(link => {
      const isActive = current === link.href;
      const a = document.createElement('a');
      a.href = link.href;
      a.className = isActive
        ? 'text-primary border-b-2 border-primary pb-1 font-bold text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2'
        : 'text-on-surface-variant hover:text-on-surface transition-colors text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2 rounded-lg';
      a.textContent = link.label;
      nav.appendChild(a);
    });
  })();

  // Page render
  (function() {
    const d = TRAVEL_DETAIL;
    const colorMap = { primary: 'bg-primary text-on-primary', secondary: 'bg-secondary text-on-secondary', tertiary: 'bg-tertiary text-on-tertiary' };
    const typeColors = { primary: 'bg-primary/10 text-primary', secondary: 'bg-secondary/10 text-secondary', tertiary: 'bg-tertiary/10 text-tertiary' };

    let daysHTML = d.days.map(day => `
      <section class="relative">
        <div class="sticky top-24 z-30 bg-background/90 backdrop-blur-md py-4 mb-8 border-b border-outline-variant flex justify-between items-end">
          <div>
            <h2 class="font-display text-3xl font-bold text-on-surface">${day.title}</h2>
            <p class="text-on-surface-variant mt-1">${day.date}</p>
          </div>
        </div>
        <div class="relative before:absolute before:inset-0 before:ml-[1.1875rem] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-outline-variant before:to-transparent space-y-8">
          ${day.events.map(ev => `
            <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
              <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-background ${colorMap[ev.color] || colorMap.primary} shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">${ev.icon}</span>
              </div>
              <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-6 rounded-xl bg-surface-container-low border border-outline-variant shadow-sm hover:shadow-md hover:border-primary/30 transition-all duration-300">
                <div class="flex items-center justify-between mb-2">
                  <time class="font-mono text-sm font-semibold text-${ev.color}">${ev.time}</time>
                  <span class="px-2 py-0.5 text-xs font-medium bg-tertiary-container text-on-tertiary-container rounded-sm">${ev.type}</span>
                </div>
                <h3 class="font-display text-xl font-bold text-on-surface mb-2">${ev.title}</h3>
                <p class="text-on-surface-variant text-sm mb-3">${ev.description}</p>
                <details class="group/details">
                  <summary class="text-sm font-medium text-primary hover:text-primary-container flex items-center gap-1 transition-colors cursor-pointer list-none">查看详情 <span class="material-symbols-outlined text-sm group-open/details:rotate-180 transition-transform">expand_more</span></summary>
                  <p class="text-on-surface-variant text-sm mt-3 pt-3 border-t border-outline-variant/30">${ev.detail || '暂无更多详情。'}</p>
                </details>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    `).join('');

    document.getElementById('app').innerHTML = `
      <header class="relative w-full h-[500px] min-h-[400px] bg-surface-container-high flex items-end">
        <div class="absolute inset-0 z-0">
          <img alt="${d.title}" class="w-full h-full object-cover" src="${d.heroImage}"/>
          <div class="absolute inset-0 bg-gradient-to-t from-on-background/80 via-on-background/40 to-transparent"></div>
        </div>
        <div class="relative z-10 w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop pb-12 pt-32">
          <div class="inline-flex items-center gap-2 px-3 py-1 bg-primary/20 backdrop-blur-md rounded-full text-primary-fixed-dim text-sm font-medium mb-4 border border-primary/30">
            <span class="material-symbols-outlined text-sm">calendar_month</span> ${d.dates}
          </div>
          <h1 class="font-display text-5xl md:text-6xl font-extrabold text-surface-container-lowest tracking-tight mb-4 drop-shadow-md">${d.title}</h1>
          <p class="text-surface-variant text-lg md:text-xl max-w-2xl drop-shadow-sm">${d.subtitle}</p>
        </div>
      </header>
      <main class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-16 grid grid-cols-1 lg:grid-cols-12 gap-12">
        <div class="lg:col-span-8 space-y-16">${daysHTML}</div>
        <aside class="lg:col-span-4">
          <div class="sticky top-32 space-y-6">
            <div class="grid grid-cols-2 gap-4">
              <div class="bg-surface-container-highest p-4 rounded-xl border border-outline-variant/50">
                <div class="flex items-center gap-2 text-on-surface-variant mb-2">
                  <span class="material-symbols-outlined text-lg">partly_cloudy_day</span>
                  <span class="text-xs font-semibold uppercase tracking-wider">天气</span>
                </div>
                <div class="text-2xl font-display font-bold text-on-surface">22°C</div>
                <div class="text-xs text-on-surface-variant mt-1">晴朗宜人</div>
              </div>
              <div class="bg-surface-container-highest p-4 rounded-xl border border-outline-variant/50">
                <div class="flex items-center gap-2 text-on-surface-variant mb-2">
                  <span class="material-symbols-outlined text-lg">payments</span>
                  <span class="text-xs font-semibold uppercase tracking-wider">货币</span>
                </div>
                <div class="text-2xl font-display font-bold text-on-surface">¥150</div>
                <div class="text-xs text-on-surface-variant mt-1">1 USD ≈ 150 JPY</div>
              </div>
            </div>
            <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6">
              <h3 class="font-headline font-bold text-on-surface mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-primary">info</span>旅行贴士</h3>
              <ul class="space-y-2 text-sm text-on-surface-variant">
                <li class="flex items-start gap-2"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_small</span> 建议提前兑换日元</li>
                <li class="flex items-start gap-2"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_small</span> JR Pass 需在出发前购买兑换券</li>
                <li class="flex items-start gap-2"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_small</span> 随身携带护照以便免税购物</li>
                <li class="flex items-start gap-2"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_small</span> 推荐下载 Google Maps 离线地图</li>
              </ul>
            </div>
          </div>
        </aside>
      </main>
    `;
  })();
</script>
</body>
</html>
