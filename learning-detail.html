<!DOCTYPE html>
<html class="light" lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>学习详情 — Journey Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link crossorigin rel="preconnect" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="js/data.js"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {"on-background":"#111c2d","outline":"#757684","on-primary":"#ffffff","tertiary-fixed":"#dde3eb","tertiary-container":"#555b62","surface-container-low":"#f0f3ff","on-secondary":"#ffffff","primary-container":"#3f51b5","surface-variant":"#d8e3fb","surface-container-lowest":"#ffffff","on-tertiary-fixed-variant":"#41474e","tertiary":"#3d444a","primary-fixed-dim":"#bac3ff","on-surface":"#111c2d","on-secondary-fixed":"#0b1c30","secondary-container":"#d0e1fb","secondary":"#505f76","inverse-on-surface":"#ecf1ff","on-surface-variant":"#454652","background":"#f9f9ff","primary-fixed":"#dee0ff","outline-variant":"#c5c5d4","on-tertiary":"#ffffff","surface":"#f9f9ff","surface-container-highest":"#d8e3fb","surface-bright":"#f9f9ff","on-primary-fixed-variant":"#293ca0","surface-container-high":"#dee8ff","surface-container":"#e7eeff","primary":"#24389c","tertiary-fixed-dim":"#c1c7cf","on-error":"#ffffff","surface-tint":"#4355b9","on-tertiary-fixed":"#161c22","on-secondary-container":"#54647a","inverse-surface":"#263143","on-secondary-fixed-variant":"#38485d","error":"#ba1a1a","secondary-fixed-dim":"#b7c8e1","inverse-primary":"#bac3ff","on-primary-container":"#cacfff","on-primary-fixed":"#00105c","on-tertiary-container":"#cdd3db","surface-dim":"#cfdaf2","secondary-fixed":"#d3e4fe","on-error-container":"#93000a","error-container":"#ffdad6"},
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { "margin-desktop": "64px", "container-max": "1280px", base: "8px", "section-gap": "80px", "margin-mobile": "20px", gutter: "24px" },
        fontFamily: {"display-lg":["Hanken Grotesk"],"headline-lg":["Hanken Grotesk"],"headline-md":["Hanken Grotesk"],"display-lg-mobile":["Hanken Grotesk"],"body-lg":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"label-sm":["Inter"]},
        fontSize: {"display-lg":["48px",{lineHeight:"56px",letterSpacing:"-0.02em",fontWeight:"700"}],"display-lg-mobile":["36px",{lineHeight:"44px",letterSpacing:"-0.02em",fontWeight:"700"}],"headline-lg":["32px",{lineHeight:"40px",fontWeight:"600"}],"headline-md":["24px",{lineHeight:"32px",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"28px",fontWeight:"400"}],"body-md":["16px",{lineHeight:"24px",fontWeight:"400"}],"label-md":["14px",{lineHeight:"20px",letterSpacing:"0.01em",fontWeight:"500"}],"label-sm":["12px",{lineHeight:"16px",fontWeight:"600"}]}
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, h4, .font-display, .font-headline { font-family: 'Hanken Grotesk', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">

<!-- Navigation -->
<nav id="navbar" class="bg-surface/80 backdrop-blur-md border-b border-outline-variant fixed top-0 w-full z-50">
  <div class="flex justify-between items-center h-16 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
    <a href="index.html" class="text-headline-md text-headline-md font-display font-black text-primary tracking-tight">Journey Scholar</a>
    <div class="hidden md:flex items-center gap-8" id="nav-links"></div>
    <div class="flex items-center gap-4">
      <span class="material-symbols-outlined text-primary cursor-pointer">search</span>
      <a href="admin.html"><span class="material-symbols-outlined text-primary cursor-pointer">account_circle</span></a>
    </div>
  </div>
</nav>

<main class="flex-grow pt-24 pb-section-gap px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto w-full">

  <!-- Breadcrumbs -->
  <div class="flex items-center gap-2 mb-8 text-label-md text-on-surface-variant">
    <a class="hover:text-primary transition-colors" href="learning.html">学习路径</a>
    <span class="material-symbols-outlined text-[16px]">chevron_right</span>
    <span class="text-on-background" id="breadcrumb-title"></span>
  </div>

  <!-- Header -->
  <header id="detail-header" class="mb-12 relative rounded-xl overflow-hidden bg-surface-container-low border border-outline-variant p-8 md:p-12 flex flex-col md:flex-row gap-8 items-end justify-between shadow-sm">
  </header>

  <!-- Content Grid -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
    <!-- Left: Curriculum Timeline -->
    <div class="lg:col-span-8" id="curriculum"></div>

    <!-- Right: Resources & Notes -->
    <div class="lg:col-span-4 flex flex-col gap-6 mt-12 lg:mt-0" id="sidebar"></div>
  </div>
</main>

<!-- Footer -->
<footer class="w-full bg-surface-container-lowest border-t border-outline-variant mt-auto">
  <div class="flex flex-col md:flex-row justify-between items-center py-4 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto h-24">
    <div class="font-headline-md text-headline-md text-on-surface mb-4 md:mb-0">Journey Scholar</div>
    <div class="flex gap-6 mb-4 md:mb-0">
      <a class="text-body-md text-on-tertiary-fixed-variant hover:text-primary transition-colors" href="#">隐私政策</a>
      <a class="text-body-md text-on-tertiary-fixed-variant hover:text-primary transition-colors" href="#">服务条款</a>
      <a class="text-body-md text-on-tertiary-fixed-variant hover:text-primary transition-colors" href="#">联系</a>
    </div>
    <div class="text-body-md text-on-surface-variant" id="footer-copy"></div>
  </div>
</footer>

<script>
  // Navigation
  (function() {
    const nav = document.getElementById('nav-links');
    const current = location.pathname.split('/').pop();
    NAV_LINKS.forEach(link => {
      const isActive = current === link.href;
      const a = document.createElement('a');
      a.href = link.href;
      a.className = isActive
        ? 'text-primary font-bold border-b-2 border-primary pb-1 text-body-md transition-colors'
        : 'text-on-surface-variant hover:text-primary transition-colors text-body-md';
      a.textContent = link.label;
      nav.appendChild(a);
    });
  })();

  // Page content
  (function() {
    const d = LEARNING_DETAIL;
    document.getElementById('breadcrumb-title').textContent = d.title;

    // Header
    document.getElementById('detail-header').innerHTML = `
      <div class="absolute inset-0 z-0 opacity-10"><img alt="" class="w-full h-full object-cover" src="${d.heroImage}"/></div>
      <div class="relative z-10 max-w-2xl">
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-surface-container-highest rounded-full mb-4">
          <span class="w-2 h-2 rounded-full bg-primary"></span>
          <span class="text-label-sm text-primary uppercase tracking-wider">${d.module}</span>
        </div>
        <h1 class="text-display-lg-mobile md:text-display-lg text-on-background mb-4 font-headline">${d.title}</h1>
        <p class="text-body-lg text-on-surface-variant">${d.description}</p>
      </div>
      <div class="relative z-10 w-full md:w-72 bg-surface-container-lowest p-6 rounded-lg border border-outline-variant">
        <div class="flex justify-between items-center mb-3">
          <span class="text-label-md text-on-surface">总体进度</span>
          <span class="text-headline-md text-primary">${d.overallProgress}%</span>
        </div>
        <div class="w-full bg-surface-variant rounded-full h-1.5 overflow-hidden">
          <div class="bg-primary h-1.5 rounded-full transition-all duration-700" style="width:${d.overallProgress}%"></div>
        </div>
        <div class="mt-3 text-label-sm text-on-surface-variant text-right">已完成 ${d.completed}/${d.total} 课时</div>
      </div>`;

    // Curriculum Timeline
    const statusCfg = {
      completed: { dot: 'bg-primary', dotIcon: '<span class="material-symbols-outlined text-on-primary text-[10px]" style="font-variation-settings:\'FILL\' 1;">check</span>', badge: '已完成', badgeStyle: 'bg-surface-container-low text-on-surface-variant border-outline-variant/30', border: 'border-outline-variant', progressBar: true, actionBtn: '<button class="text-label-md text-primary border border-outline-variant px-4 py-2 rounded-lg hover:bg-surface-variant transition-colors">复习资料</button>' },
      active: { dot: 'bg-surface border-4 border-primary', dotIcon: '', badge: '进行中', badgeStyle: 'bg-primary/10 text-primary border-primary/20', border: 'border-2 border-primary', progressBar: true, actionBtn: '<button class="text-label-md bg-primary text-on-primary px-5 py-2.5 rounded-lg hover:bg-on-primary-fixed-variant transition-colors flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">play_circle</span> 继续学习</button>' },
      locked: { dot: 'bg-outline-variant', dotIcon: '', badge: '已锁定', badgeStyle: 'bg-surface-container text-on-surface-variant', border: 'border-outline-variant border-dashed', progressBar: false, actionBtn: '' }
    };

    document.getElementById('curriculum').innerHTML = `
      <h2 class="text-headline-lg text-on-background mb-8 flex items-center gap-3 font-headline">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">route</span> 课程路线图
      </h2>
      <div class="relative pl-6 md:pl-10 ml-2 md:ml-4 border-l-2 border-surface-variant flex flex-col gap-10">
        ${d.lessons.map(l => {
          const cfg = statusCfg[l.status];
          return `
            <div class="relative ${l.status === 'locked' ? 'opacity-70 grayscale-[30%]' : ''}">
              <div class="absolute -left-[31px] md:-left-[47px] top-1 w-5 h-5 rounded-full ${cfg.dot} border-4 border-background flex items-center justify-center">${cfg.dotIcon}</div>
              <div class="bg-surface-container-lowest ${cfg.border} rounded-xl p-6 transition-all hover:border-primary hover:shadow-sm group">
                <div class="flex flex-wrap gap-3 items-center mb-3">
                  <span class="px-2.5 py-1 ${cfg.badgeStyle} text-label-sm rounded-full flex items-center gap-1 border">
                    ${l.status === 'active' ? '<span class="material-symbols-outlined text-[12px] animate-pulse">sync</span>' : (l.status === 'locked' ? '<span class="material-symbols-outlined text-[12px]">lock</span>' : '<span class="w-1.5 h-1.5 rounded-full bg-primary"></span>')}
                    ${cfg.badge}
                  </span>
                  <span class="text-label-md text-outline">课时 ${l.id}</span>
                </div>
                <h3 class="text-headline-md text-on-background mb-2 group-hover:text-primary transition-colors font-headline">${l.title}</h3>
                <p class="text-body-md text-on-surface-variant mb-4">${l.description}</p>
                ${l.task ? `
                  <div class="bg-surface-container-low rounded-lg p-4 mb-4">
                    <div class="flex justify-between items-center mb-2 text-label-md">
                      <span class="text-on-surface">当前任务: ${l.task}</span>
                      <span class="text-primary">${l.progress}%</span>
                    </div>
                    <div class="w-full bg-outline-variant/30 rounded-full h-1">
                      <div class="bg-primary h-1 rounded-full" style="width:${l.progress}%"></div>
                    </div>
                  </div>` : ''}
                ${cfg.actionBtn}
              </div>
            </div>`;
        }).join('')}
      </div>`;

    // Sidebar
    document.getElementById('sidebar').innerHTML = `
      <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 hover:shadow-md transition-shadow">
        <h3 class="text-headline-md text-on-background mb-4 flex items-center gap-2 border-b border-outline-variant pb-4">
          <span class="material-symbols-outlined text-secondary">collections_bookmark</span> 学习资源
        </h3>
        <ul class="flex flex-col">
          ${d.resources.map(r => `
            <li class="py-3 border-b border-outline-variant/50 last:border-0 group cursor-pointer">
              <a class="flex items-start gap-3" href="#">
                <div class="bg-surface-container-low p-2 rounded-lg text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
                  <span class="material-symbols-outlined text-[20px]">${r.icon}</span>
                </div>
                <div>
                  <div class="text-label-md text-on-surface group-hover:text-primary transition-colors">${r.title}</div>
                  <div class="text-label-sm text-outline mt-0.5">${r.type} · ${r.duration}</div>
                </div>
              </a>
            </li>`).join('')}
        </ul>
      </div>

      <div class="bg-surface-container-low border border-outline-variant/50 rounded-xl p-6 flex-grow flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-headline-md text-on-background flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">edit_note</span> 个人笔记
          </h3>
          <button class="text-primary hover:text-on-primary-fixed-variant transition-colors">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
        <div class="flex-grow flex flex-col gap-3">
          ${d.notes.map(n => `
            <div class="bg-surface-container-lowest p-3 rounded-lg border-l-2 border-${n.color} text-sm text-on-surface-variant">
              <strong class="text-on-surface block mb-1">${n.title}</strong> ${n.text}
            </div>`).join('')}
        </div>
        <div class="mt-4 relative">
          <input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-body-md text-on-surface placeholder-outline transition-colors" placeholder="快速记录核心要点..." type="text"/>
          <span class="material-symbols-outlined absolute right-0 top-2 text-outline cursor-pointer hover:text-primary transition-colors">send</span>
        </div>
      </div>`;

    document.getElementById('footer-copy').textContent = `© ${SITE_CONFIG.year} ${SITE_CONFIG.name}. All rights reserved.`;
  })();
</script>
</body>
</html>
