<!DOCTYPE html>
<html class="light" lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>学习路径 — Journey Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link crossorigin rel="preconnect" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="js/data.js"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {"on-background":"#111c2d","outline":"#757684","on-primary":"#ffffff","tertiary-fixed":"#dde3eb","tertiary-container":"#555b62","surface-container-low":"#f0f3ff","on-secondary":"#ffffff","primary-container":"#3f51b5","surface-variant":"#d8e3fb","surface-container-lowest":"#ffffff","on-tertiary-fixed-variant":"#41474e","tertiary":"#3d444a","primary-fixed-dim":"#bac3ff","on-surface":"#111c2d","on-secondary-fixed":"#0b1c30","secondary-container":"#d0e1fb","secondary":"#505f76","inverse-on-surface":"#ecf1ff","on-surface-variant":"#454652","background":"#f9f9ff","primary-fixed":"#dee0ff","outline-variant":"#c5c5d4","on-tertiary":"#ffffff","surface":"#f9f9ff","surface-container-highest":"#d8e3fb","surface-bright":"#f9f9ff","on-primary-fixed-variant":"#293ca0","surface-container-high":"#dee8ff","surface-container":"#e7eeff","primary":"#24389c","tertiary-fixed-dim":"#c1c7cf","on-error":"#ffffff","surface-tint":"#4355b9","on-tertiary-fixed":"#161c22","on-secondary-container":"#54647a","inverse-surface":"#263143","on-secondary-fixed-variant":"#38485d","error":"#ba1a1a","secondary-fixed-dim":"#b7c8e1","inverse-primary":"#bac3ff","on-primary-container":"#cacfff","on-primary-fixed":"#00105c","on-tertiary-container":"#cdd3db","surface-dim":"#cfdaf2","secondary-fixed":"#d3e4fe","on-error-container":"#93000a","error-container":"#ffdad6"},
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { "margin-desktop": "64px", "container-max": "1280px", base: "8px", "section-gap": "80px", "margin-mobile": "20px", gutter: "24px" },
        fontFamily: {"display-lg":["Hanken Grotesk"],"headline-lg":["Hanken Grotesk"],"headline-md":["Hanken Grotesk"],"display-lg-mobile":["Hanken Grotesk"],"body-lg":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"label-sm":["Inter"]},
        fontSize: {"display-lg":["48px",{lineHeight:"56px",letterSpacing:"-0.02em",fontWeight:"700"}],"display-lg-mobile":["36px",{lineHeight:"44px",letterSpacing:"-0.02em",fontWeight:"700"}],"headline-lg":["32px",{lineHeight:"40px",fontWeight:"600"}],"headline-md":["24px",{lineHeight:"32px",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"28px",fontWeight:"400"}],"body-md":["16px",{lineHeight:"24px",fontWeight:"400"}],"label-md":["14px",{lineHeight:"20px",letterSpacing:"0.01em",fontWeight:"500"}],"label-sm":["12px",{lineHeight:"16px",fontWeight:"600"}]}
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, h4, h5, h6, .font-display, .font-headline { font-family: 'Hanken Grotesk', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">

<!-- Navigation -->
<nav id="navbar" class="bg-surface shadow-sm border-b border-outline-variant sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
    <a href="index.html" class="text-headline-md font-display font-black text-primary tracking-tight">Journey Scholar</a>
    <div class="hidden md:flex space-x-6" id="nav-links"></div>
    <div class="flex items-center space-x-4 text-primary">
      <button class="hover:bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">account_circle</span></button>
      <a href="admin.html" class="hover:bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">settings</span></a>
    </div>
  </div>
</nav>

<main class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-12 flex flex-col gap-12">

  <!-- Dashboard Header -->
  <section class="bg-surface-container-low rounded-xl p-8 border border-outline-variant/30 flex flex-col md:flex-row gap-8 items-center justify-between shadow-sm">
    <div class="flex-1 space-y-4">
      <h1 class="text-display-lg-mobile md:text-display-lg font-headline font-bold text-on-surface">当前目标与进度</h1>
      <p class="text-on-surface-variant text-body-lg max-w-2xl" id="header-desc"></p>
    </div>
    <div class="w-full md:w-1/3 bg-surface rounded-lg p-6 border border-outline-variant/50 flex flex-col gap-3" id="overall-progress">
    </div>
  </section>

  <!-- Learning Modules Grid -->
  <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="modules-grid">
  </section>

</main>

<!-- Footer -->
<footer class="bg-surface-container-highest border-t border-outline-variant mt-auto">
  <div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-8 max-w-container-max mx-auto gap-4">
    <div class="text-label-md font-bold text-on-surface-variant" id="footer-brand"></div>
    <div class="flex gap-6">
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">隐私</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">关于</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">站点状态</a>
    </div>
  </div>
</footer>

<script>
  // Navigation
  (function() {
    const nav = document.getElementById('nav-links');
    const current = location.pathname.split('/').pop();
    NAV_LINKS.forEach(link => {
      const isActive = current === link.href;
      const a = document.createElement('a');
      a.href = link.href;
      a.className = isActive
        ? 'text-primary border-b-2 border-primary pb-1 font-bold text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2'
        : 'text-on-surface-variant hover:text-on-surface transition-colors text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2 rounded-lg';
      a.textContent = link.label;
      nav.appendChild(a);
    });
  })();

  // Data
  (function() {
    const active = LEARNING_MODULES.filter(m => m.status === 'active');
    const completed = LEARNING_MODULES.filter(m => m.status === 'completed');
    const totalProgress = Math.round(LEARNING_MODULES.reduce((s, m) => s + m.progress, 0) / LEARNING_MODULES.length);

    document.getElementById('header-desc').textContent = `跟踪您的全栈开发和云工程之旅。专注于即将到来的里程碑，${completed.length} 个模块已完成。`;

    document.getElementById('overall-progress').innerHTML = `
      <div class="flex justify-between items-center text-label-md font-medium">
        <span class="text-on-surface">总体完成度</span>
        <span class="text-primary font-bold">${totalProgress}%</span>
      </div>
      <div class="w-full bg-surface-variant rounded-full h-3 overflow-hidden">
        <div class="bg-primary h-3 rounded-full transition-all duration-700" style="width:${totalProgress}%"></div>
      </div>
      <div class="flex gap-4 mt-2 text-label-sm text-on-surface-variant">
        <div class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-tertiary">check_circle</span> ${completed.length} 个已完成</div>
        <div class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px] text-primary">pending</span> ${active.length} 个进行中</div>
      </div>`;

    const grid = document.getElementById('modules-grid');
    const statusConfig = {
      completed: { border: 'border-outline-variant', bg: 'bg-surface', opacity: 'opacity-80', badge: '已完成', badgeStyle: 'bg-surface-container-high text-on-surface-variant', barColor: 'bg-tertiary' },
      active: { border: 'border-2 border-primary', bg: 'bg-surface', opacity: '', badge: '进行中', badgeStyle: 'bg-primary text-on-primary animate-pulse', barColor: 'bg-primary' },
      locked: { border: 'border-outline-variant border-dashed', bg: 'bg-surface-container-low', opacity: 'opacity-60', badge: '未解锁', badgeStyle: 'bg-surface-variant text-on-surface-variant', barColor: 'bg-surface-variant' }
    };

    LEARNING_MODULES.forEach(m => {
      const cfg = statusConfig[m.status];
      const isLocked = m.status === 'locked';

      const footerLinks = isLocked
        ? `<span class="text-on-surface-variant font-medium flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">code</span> 待解锁</span>`
        : m.links.map(l => `<a class="text-primary font-medium hover:underline flex items-center gap-1" href="${l.href}"><span class="material-symbols-outlined text-[18px]">${l.icon}</span> ${l.label}</a>`).join('');

      const mainAction = m.status === 'active' && m.link
        ? `<a href="${m.link.href}" class="text-primary font-medium hover:underline flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">${m.link.icon}</span> ${m.link.label}</a>`
        : footerLinks;

      grid.innerHTML += `
        <article class="${cfg.bg} rounded-xl ${cfg.border} shadow-sm flex flex-col overflow-hidden ${cfg.opacity} relative">
          ${m.status === 'active' ? '<div class="absolute top-0 right-0 w-16 h-16 bg-primary/5 rounded-bl-full -z-10"></div>' : ''}
          <div class="p-6 flex-grow flex flex-col gap-4">
            <div class="flex justify-between items-start">
              <div class="p-3 ${m.status === 'active' ? 'bg-primary-container text-on-primary-container' : 'bg-tertiary-container/20 text-tertiary'} rounded-lg">
                <span class="material-symbols-outlined">${m.icon}</span>
              </div>
              <span class="px-3 py-1 ${cfg.badgeStyle} text-label-sm font-bold rounded-full ${isLocked ? 'flex items-center gap-1' : ''}">${isLocked ? '<span class="material-symbols-outlined text-[14px]">lock</span>' : ''}${cfg.badge}</span>
            </div>
            <div>
              <h2 class="text-headline-md font-headline font-bold text-on-surface mb-1">${m.title}</h2>
              <p class="text-body-md text-on-surface-variant">${m.description}</p>
            </div>
            <div class="mt-auto pt-4">
              <div class="flex justify-between text-label-sm mb-1">
                <span class="font-medium ${m.status === 'active' ? 'text-primary' : 'text-on-surface'}">${isLocked ? m.stats : '进度'}</span>
                ${!isLocked ? `<span class="text-primary font-bold">${m.progress}%</span>` : ''}
              </div>
              <div class="w-full bg-surface-variant rounded-full h-2">
                <div class="${cfg.barColor} h-2 rounded-full transition-all duration-700" style="width:${m.progress}%"></div>
              </div>
            </div>
          </div>
          <div class="bg-surface-container-lowest border-t border-outline-variant p-4 flex gap-4 text-label-md justify-center ${isLocked ? 'opacity-50 pointer-events-none' : ''}">
            ${mainAction}
          </div>
        </article>`;
    });
  })();

  document.getElementById('footer-brand').textContent = `© ${SITE_CONFIG.year} ${SITE_CONFIG.name} · ${SITE_CONFIG.author}`;
</script>
</body>
</html>
