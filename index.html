<!DOCTYPE html>
<html class="light" lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Journey Scholar — 学习与旅途记录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link crossorigin rel="preconnect" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="js/data.js"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-background": "#111c2d", "outline": "#757684",
          "on-primary": "#ffffff", "tertiary-fixed": "#dde3eb",
          "tertiary-container": "#555b62", "surface-container-low": "#f0f3ff",
          "on-secondary": "#ffffff", "primary-container": "#3f51b5",
          "surface-variant": "#d8e3fb", "surface-container-lowest": "#ffffff",
          "on-tertiary-fixed-variant": "#41474e", "tertiary": "#3d444a",
          "primary-fixed-dim": "#bac3ff", "on-surface": "#111c2d",
          "on-secondary-fixed": "#0b1c30", "secondary-container": "#d0e1fb",
          "secondary": "#505f76", "inverse-on-surface": "#ecf1ff",
          "on-surface-variant": "#454652", "background": "#f9f9ff",
          "primary-fixed": "#dee0ff", "outline-variant": "#c5c5d4",
          "on-tertiary": "#ffffff", "surface": "#f9f9ff",
          "surface-container-highest": "#d8e3fb", "surface-bright": "#f9f9ff",
          "on-primary-fixed-variant": "#293ca0", "surface-container-high": "#dee8ff",
          "surface-container": "#e7eeff", "primary": "#24389c",
          "tertiary-fixed-dim": "#c1c7cf", "on-error": "#ffffff",
          "surface-tint": "#4355b9", "on-tertiary-fixed": "#161c22",
          "on-secondary-container": "#54647a", "inverse-surface": "#263143",
          "on-secondary-fixed-variant": "#38485d", "error": "#ba1a1a",
          "secondary-fixed-dim": "#b7c8e1", "inverse-primary": "#bac3ff",
          "on-primary-container": "#cacfff", "on-primary-fixed": "#00105c",
          "on-tertiary-container": "#cdd3db", "surface-dim": "#cfdaf2",
          "secondary-fixed": "#d3e4fe", "on-error-container": "#93000a",
          "error-container": "#ffdad6"
        },
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { "margin-desktop": "64px", "container-max": "1280px", base: "8px", "section-gap": "80px", "margin-mobile": "20px", gutter: "24px" },
        fontFamily: {
          "display-lg": ["Hanken Grotesk"], "headline-lg": ["Hanken Grotesk"],
          "headline-md": ["Hanken Grotesk"], "display-lg-mobile": ["Hanken Grotesk"],
          "body-lg": ["Inter"], "body-md": ["Inter"], "label-md": ["Inter"], "label-sm": ["Inter"]
        },
        fontSize: {
          "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "display-lg-mobile": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
          "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "500" }],
          "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, h4, h5, h6, .font-display, .font-headline { font-family: 'Hanken Grotesk', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">

<!-- ===== Navigation Bar ===== -->
<nav id="navbar" class="bg-surface shadow-sm border-b border-outline-variant sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
    <a href="index.html" class="flex items-center"><img src="logo.svg" alt="Logo" class="h-9 w-9"/></a>
    <div class="hidden md:flex space-x-6" id="nav-links"></div>
  </div>
</nav>

<!-- ===== Hero Section (Bento Grid) ===== -->
<main class="flex-grow">
  <section class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-12 md:py-20">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 auto-rows-[300px]">

      <!-- Main Welcome Card -->
      <div class="md:col-span-2 md:row-span-2 rounded-xl overflow-hidden relative group">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" style="background-image: url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1200&q=80');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-on-background/80 via-on-background/40 to-transparent"></div>
        <div class="absolute bottom-0 left-0 p-8 text-on-primary">
          <h1 class="text-display-lg-mobile md:text-display-lg font-headline font-black mb-4 tracking-tight">通过学习成长。</h1>
          <p class="text-body-lg max-w-lg mb-6 opacity-90">规划一条持续改进和全球发现之路。一个技术精通和文化探索的鲜活档案。</p>
          <a href="learning.html" class="inline-flex items-center gap-2 bg-primary text-on-primary px-6 py-3 rounded-full font-label-md font-bold hover:bg-on-primary-fixed-variant transition-colors">
            开始旅程 <span class="material-symbols-outlined text-sm">arrow_forward</span>
          </a>
        </div>
      </div>

      <!-- Secondary Hero Card 1 (Travel) -->
      <div class="rounded-xl overflow-hidden relative group">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" style="background-image: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=800&q=80');"></div>
        <div class="absolute inset-0 bg-black/40 group-hover:bg-black/50 transition-colors"></div>
        <div class="absolute inset-0 p-6 flex flex-col justify-between text-on-primary">
          <div class="flex justify-end"><span class="bg-surface/20 backdrop-blur-md px-3 py-1 rounded-full text-xs uppercase tracking-wider">发现</span></div>
          <div>
            <h2 class="text-headline-md font-headline font-bold mb-2">通过旅行</h2>
            <p class="text-sm opacity-80 line-clamp-2">拓展屏幕之外的视野。</p>
          </div>
        </div>
      </div>

      <!-- Secondary Hero Card 2 (Stats) -->
      <div class="bg-surface-container-high rounded-xl p-6 flex flex-col justify-center relative overflow-hidden group">
        <div class="absolute top-0 right-0 -mt-8 -mr-8 w-32 h-32 bg-primary/10 rounded-full blur-2xl group-hover:bg-primary/20 transition-colors"></div>
        <div class="absolute bottom-0 left-0 -mb-8 -ml-8 w-24 h-24 bg-tertiary/10 rounded-full blur-xl group-hover:bg-tertiary/20 transition-colors"></div>
        <span class="material-symbols-outlined text-4xl text-primary mb-4" style="font-variation-settings: 'FILL' 1;">track_changes</span>
        <h3 class="text-display-lg font-display font-black text-on-surface mb-2" id="active-count">--</h3>
        <p class="text-on-surface-variant text-sm uppercase tracking-widest">活跃项目</p>
      </div>
    </div>
  </section>

  <!-- ===== Featured Sections ===== -->
  <section class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-12">
    <div class="flex flex-col md:flex-row gap-8 items-stretch" id="featured-content"></div>
  </section>
</main>

<!-- ===== Footer ===== -->
<footer class="bg-surface-container-highest border-t border-outline-variant mt-auto">
  <div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-8 max-w-container-max mx-auto gap-4">
    <div class="text-label-md font-bold text-on-surface-variant" id="footer-brand"></div>
    <div class="flex gap-6">
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">隐私</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">关于</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">站点状态</a>
    </div>
  </div>
</footer>

<script>
  // --- Render Navigation ---
  (function() {
    const nav = document.getElementById('nav-links');
    const current = location.pathname.split('/').pop() || 'index.html';
    NAV_LINKS.forEach(link => {
      const isActive = current === link.href;
      const a = document.createElement('a');
      a.href = link.href;
      a.className = isActive
        ? 'text-primary border-b-2 border-primary pb-1 font-bold text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2'
        : 'text-on-surface-variant hover:text-on-surface transition-colors text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2 rounded-lg';
      a.textContent = link.label;
      nav.appendChild(a);
    });
  })();

  // --- Active projects count ---
  document.getElementById('active-count').textContent = LEARNING_MODULES.filter(m => m.status === 'active').length + TRAVEL_ITEMS.length;

  // --- Featured Content ---
  (function() {
    const container = document.getElementById('featured-content');
    const activeModule = LEARNING_MODULES.find(m => m.status === 'active') || LEARNING_MODULES[0];
    const latestTravel = TRAVEL_ITEMS[0];

    // Learning Path Preview
    const learningCard = document.createElement('div');
    learningCard.className = 'flex-1 bg-surface-container rounded-xl p-8 border border-outline-variant/30 shadow-sm relative overflow-hidden';
    learningCard.innerHTML = `
      <div class="absolute top-0 right-0 w-64 h-64 bg-secondary-container/50 rounded-full blur-3xl -mr-20 -mt-20"></div>
      <div class="relative z-10">
        <div class="flex items-center gap-3 mb-6">
          <div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">menu_book</span>
          </div>
          <h2 class="text-headline-md font-headline font-bold text-on-surface">当前学习路径</h2>
        </div>
        <div class="bg-surface rounded-lg p-6 shadow-sm border border-outline-variant/20 mb-4">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="text-lg font-bold text-on-surface mb-1">${activeModule.title}</h3>
              <p class="text-sm text-on-surface-variant">${activeModule.description}</p>
            </div>
            <span class="bg-tertiary-container/20 text-tertiary-container text-xs font-bold px-2 py-1 rounded">${activeModule.status === 'active' ? '活跃' : '已完成'}</span>
          </div>
          <div class="mt-6">
            <div class="flex justify-between text-sm mb-2 font-label-sm">
              <span class="text-on-surface-variant">进度</span>
              <span class="text-primary font-bold">${activeModule.progress}%</span>
            </div>
            <div class="w-full bg-surface-variant rounded-full h-2.5">
              <div class="bg-primary h-2.5 rounded-full" style="width:${activeModule.progress}%"></div>
            </div>
          </div>
        </div>
        <a href="learning.html" class="inline-flex items-center text-sm text-primary hover:text-on-primary-fixed-variant transition-colors group">
          查看完整课程 <span class="material-symbols-outlined text-sm ml-1 group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </a>
      </div>`;
    container.appendChild(learningCard);

    // Latest Adventure
    const travelCard = document.createElement('div');
    travelCard.className = 'flex-1 rounded-xl overflow-hidden relative group min-h-[300px]';
    travelCard.innerHTML = `
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-110" style="background-image:url('${latestTravel.image}');"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-on-background/90 via-on-background/30 to-transparent"></div>
      <div class="absolute inset-0 p-8 flex flex-col justify-end text-on-primary">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-sm">flight_takeoff</span>
          <span class="text-xs uppercase tracking-widest opacity-80">最新冒险</span>
        </div>
        <h2 class="text-headline-lg font-headline font-bold mb-2">${latestTravel.title}</h2>
        <div class="flex items-center gap-4 text-sm opacity-90 mb-4">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">calendar_today</span> ${latestTravel.dates.split(' - ')[0].slice(0,6)}</span>
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">location_on</span> ${latestTravel.tags[0]}</span>
        </div>
        <a href="travel-detail.html" class="bg-surface/20 hover:bg-surface/30 backdrop-blur-md text-on-primary px-4 py-2 rounded-full text-sm transition-colors self-start border border-on-primary/20">阅读日志</a>
      </div>`;
    container.appendChild(travelCard);
  })();

  // --- Footer ---
  document.getElementById('footer-brand').textContent = `© ${SITE_CONFIG.year} ${SITE_CONFIG.name} · ${SITE_CONFIG.author}`;
</script>
</body>
</html>
