<!DOCTYPE html>
<html class="light" lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>旅行时间表 — Journey Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link crossorigin rel="preconnect" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="js/data.js"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-background": "#111c2d", "outline": "#757684", "on-primary": "#ffffff",
          "tertiary-fixed": "#dde3eb", "tertiary-container": "#555b62", "surface-container-low": "#f0f3ff",
          "on-secondary": "#ffffff", "primary-container": "#3f51b5", "surface-variant": "#d8e3fb",
          "surface-container-lowest": "#ffffff", "on-tertiary-fixed-variant": "#41474e",
          "tertiary": "#3d444a", "primary-fixed-dim": "#bac3ff", "on-surface": "#111c2d",
          "on-secondary-fixed": "#0b1c30", "secondary-container": "#d0e1fb",
          "secondary": "#505f76", "inverse-on-surface": "#ecf1ff",
          "on-surface-variant": "#454652", "background": "#f9f9ff",
          "primary-fixed": "#dee0ff", "outline-variant": "#c5c5d4",
          "on-tertiary": "#ffffff", "surface": "#f9f9ff",
          "surface-container-highest": "#d8e3fb", "surface-bright": "#f9f9ff",
          "on-primary-fixed-variant": "#293ca0", "surface-container-high": "#dee8ff",
          "surface-container": "#e7eeff", "primary": "#24389c",
          "tertiary-fixed-dim": "#c1c7cf", "on-error": "#ffffff",
          "surface-tint": "#4355b9", "on-tertiary-fixed": "#161c22",
          "on-secondary-container": "#54647a", "inverse-surface": "#263143",
          "on-secondary-fixed-variant": "#38485d", "error": "#ba1a1a",
          "secondary-fixed-dim": "#b7c8e1", "inverse-primary": "#bac3ff",
          "on-primary-container": "#cacfff", "on-primary-fixed": "#00105c",
          "on-tertiary-container": "#cdd3db", "surface-dim": "#cfdaf2",
          "secondary-fixed": "#d3e4fe", "on-error-container": "#93000a",
          "error-container": "#ffdad6"
        },
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { "margin-desktop": "64px", "container-max": "1280px", base: "8px", "section-gap": "80px", "margin-mobile": "20px", gutter: "24px" },
        fontFamily: {
          "display-lg": ["Hanken Grotesk"], "headline-lg": ["Hanken Grotesk"],
          "headline-md": ["Hanken Grotesk"], "display-lg-mobile": ["Hanken Grotesk"],
          "body-lg": ["Inter"], "body-md": ["Inter"], "label-md": ["Inter"], "label-sm": ["Inter"]
        },
        fontSize: {
          "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "display-lg-mobile": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
          "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "500" }],
          "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, h4, h5, h6, .font-display, .font-headline { font-family: 'Hanken Grotesk', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">

<!-- Navigation -->
<nav id="navbar" class="bg-surface shadow-sm border-b border-outline-variant sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
    <a href="index.html" class="text-headline-md font-display font-black text-primary tracking-tight">Journey Scholar</a>
    <div class="hidden md:flex space-x-6" id="nav-links"></div>
    <div class="flex items-center space-x-4 text-primary">
      <button class="hover:bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">account_circle</span></button>
      <a href="admin.html" class="hover:bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">settings</span></a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-section-gap flex flex-col gap-12">
  <section class="text-center space-y-4 mb-8">
    <h1 class="text-display-lg-mobile md:text-display-lg text-on-surface tracking-tight font-headline">旅行时间表</h1>
    <p class="text-on-surface-variant max-w-2xl mx-auto text-body-lg">穿越过往探险的视觉之旅，捕捉每个目的地的精髓和记忆。</p>
  </section>

  <!-- Timeline Container -->
  <div class="relative w-full max-w-4xl mx-auto" id="timeline">
    <!-- Central Line -->
    <div class="absolute left-12 md:left-1/2 top-0 bottom-0 w-0.5 bg-outline -ml-px"></div>
  </div>
</main>

<!-- Footer -->
<footer class="bg-surface-container-highest border-t border-outline-variant mt-auto">
  <div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-8 max-w-container-max mx-auto gap-4">
    <div class="text-label-md font-bold text-on-surface-variant" id="footer-brand"></div>
    <div class="flex gap-6">
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">隐私</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">关于</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm" href="#">站点状态</a>
    </div>
  </div>
</footer>

<script>
  // Navigation
  (function() {
    const nav = document.getElementById('nav-links');
    const current = location.pathname.split('/').pop();
    NAV_LINKS.forEach(link => {
      const isActive = current === link.href;
      const a = document.createElement('a');
      a.href = link.href;
      a.className = isActive
        ? 'text-primary border-b-2 border-primary pb-1 font-bold text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2'
        : 'text-on-surface-variant hover:text-on-surface transition-colors text-label-md hover:bg-surface-container-low transition-all duration-200 px-3 py-2 rounded-lg';
      a.textContent = link.label;
      nav.appendChild(a);
    });
  })();

  // Timeline
  (function() {
    const tl = document.getElementById('timeline');
    TRAVEL_ITEMS.forEach((item, idx) => {
      const isLast = idx === TRAVEL_ITEMS.length - 1;
      const isRight = item.side === 'right'; // alternate: left, right, left...

      const node = document.createElement('div');
      node.className = `relative flex flex-col md:flex-row items-center ${isLast ? '' : 'mb-24'} w-full group`;

      // Dot
      const dot = document.createElement('div');
      dot.className = 'absolute left-12 md:left-1/2 w-4 h-4 bg-primary rounded-full -ml-2 border-4 border-surface z-10';
      node.appendChild(dot);

      // Date label (desktop)
      const dateDiv = document.createElement('div');
      dateDiv.className = isRight
        ? 'hidden md:block w-1/2 pl-12 text-left order-last'
        : 'hidden md:block w-1/2 pr-12 text-right';
      dateDiv.innerHTML = `<span class="text-primary font-bold text-body-lg">${item.dates}</span>`;
      node.appendChild(dateDiv);

      // Card
      const cardWrapper = document.createElement('div');
      cardWrapper.className = isRight
        ? 'w-full md:w-1/2 pl-20 md:pl-0 pr-4 md:pr-12 md:text-right'
        : 'w-full md:w-1/2 pl-20 md:pl-12 pr-4 md:pr-0';

      cardWrapper.innerHTML = `
        <div class="bg-surface-container-lowest rounded-xl shadow-md border border-outline-variant overflow-hidden hover:shadow-lg transition-shadow duration-300 text-left">
          <div class="h-48 w-full bg-surface-variant relative">
            <img alt="${item.title}" class="w-full h-full object-cover" src="${item.image}" loading="lazy"/>
          </div>
          <div class="p-6 flex flex-col gap-4">
            <div>
              <h3 class="text-headline-md text-on-surface mb-1">${item.title}</h3>
              <p class="text-on-surface-variant text-label-sm md:hidden">${item.dates}</p>
            </div>
            <p class="text-on-surface-variant line-clamp-3">${item.summary}</p>
            <div class="flex flex-wrap gap-2">
              ${item.tags.map(t => `<span class="bg-surface-container-low text-on-surface-variant text-xs px-2.5 py-1 rounded-full">${t}</span>`).join('')}
            </div>
            <a href="travel-detail.html?id=${item.id}" class="mt-2 self-start flex items-center gap-2 text-primary font-medium hover:bg-surface-container-low px-4 py-2 rounded-full transition-colors border border-outline-variant">
              查看详情 <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </a>
          </div>
        </div>`;
      node.appendChild(cardWrapper);
      tl.appendChild(node);
    });
  })();

  // Footer
  document.getElementById('footer-brand').textContent = `© ${SITE_CONFIG.year} ${SITE_CONFIG.name} · ${SITE_CONFIG.author}`;
</script>
</body>
</html>
